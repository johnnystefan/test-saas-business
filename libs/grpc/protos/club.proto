syntax = "proto3";
package club;

service ClubService {
  rpc CreateBusinessUnit (CreateBusinessUnitRequest) returns (BusinessUnitResponse);
  rpc ListBusinessUnits (ListBusinessUnitsRequest) returns (ListBusinessUnitsResponse);
  rpc UpdateBusinessUnit (UpdateBusinessUnitRequest) returns (BusinessUnitResponse);
  rpc RegisterMember (RegisterMemberRequest) returns (MemberResponse);
  rpc EnrollMember (EnrollMemberRequest) returns (MembershipResponse);
  rpc ListMembers (ListMembersRequest) returns (ListMembersResponse);
  rpc ListMemberships (ListMembershipsRequest) returns (ListMembershipsResponse);
  rpc UpdateMembership (UpdateMembershipRequest) returns (MembershipResponse);
}

message CreateBusinessUnitRequest {
  string tenant_id = 1;
  string name = 2;
  string type = 3;
}

message UpdateBusinessUnitRequest {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  bool is_active = 4;
}

message ListBusinessUnitsRequest {
  string tenant_id = 1;
}

message ListBusinessUnitsResponse {
  repeated BusinessUnitResponse items = 1;
}

message BusinessUnitResponse {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string type = 4;
  bool is_active = 5;
  string created_at = 6;
  string updated_at = 7;
}

message RegisterMemberRequest {
  string tenant_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message EnrollMemberRequest {
  string tenant_id = 1;
  string member_id = 2;
  string business_unit_id = 3;
  string start_date = 4;
  string end_date = 5;
}

message ListMembersRequest {
  string tenant_id = 1;
}

message ListMembersResponse {
  repeated MemberResponse items = 1;
}

message MemberResponse {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string email = 4;
  string phone = 5;
  string status = 6;
  string enrolled_at = 7;
}

message ListMembershipsRequest {
  string tenant_id = 1;
  string member_id = 2;
  string email = 3;
}

message ListMembershipsResponse {
  repeated MembershipResponse items = 1;
}

message MembershipResponse {
  string id = 1;
  string tenant_id = 2;
  string member_id = 3;
  string business_unit_id = 4;
  string status = 5;
  string start_date = 6;
  string end_date = 7;
}

message UpdateMembershipRequest {
  string id = 1;
  string tenant_id = 2;
  string status = 3;
  string end_date = 4;
}
