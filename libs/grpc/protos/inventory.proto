syntax = "proto3";
package inventory;

service InventoryService {
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateStock (UpdateStockRequest) returns (ProductResponse);
  rpc RecordSale (RecordSaleRequest) returns (SaleResponse);
}

message CreateProductRequest {
  string tenant_id = 1;
  string name = 2;
  string sku = 3;
  int32 stock = 4;
  double price = 5;
}

message ListProductsRequest {
  string tenant_id = 1;
}

message ListProductsResponse {
  repeated ProductResponse items = 1;
}

message ProductResponse {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string sku = 4;
  int32 stock = 5;
  double price = 6;
}

message UpdateStockRequest {
  string id = 1;
  string tenant_id = 2;
  int32 quantity_delta = 3;
}

message RecordSaleRequest {
  string tenant_id = 1;
  string product_id = 2;
  int32 quantity = 3;
  string member_id = 4;
}

message SaleResponse {
  string id = 1;
  string product_id = 2;
  int32 quantity = 3;
  double total = 4;
  string created_at = 5;
}
